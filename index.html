<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footmarket | Sélection Coupe du Monde</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <!-- BARRE DE NAVIGATION -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-xl font-black tracking-wider text-slate-950">FOOT<span class="text-emerald-600">MARKET</span></span>
                    <span class="ml-2 bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded-full">WC 2026</span>
                </div>
                <!-- BARRE DE RECHERCHE -->
                <div class="flex-1 max-w-md mx-8">
                    <div class="relative">
                        <input type="text" id="searchInput" oninput="filtrerJoueurs()" placeholder="Rechercher un joueur, un club, un poste..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 px-5 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                        <div class="absolute left-3 top-2.5 text-slate-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- SECTION PRINCIPALE -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- BANNIÈRE COUPE DU MONDE -->
        <div class="mb-8 bg-slate-950 text-white rounded-2xl p-8 md:p-12 relative overflow-hidden shadow-md">
            <div class="relative z-10 max-w-lg">
                <span class="text-xs font-bold uppercase tracking-widest text-emerald-400">Squad Lists</span>
                <h1 class="text-3xl md:text-4xl font-black mt-2 mb-4 leading-tight">Les Joueurs Sélectionnés pour la Coupe du Monde</h1>
                <p class="text-slate-400 text-sm">Explorez les effectifs, analysez les statistiques des joueurs et suivez l'évolution de leurs valeurs sur le marché mondial.</p>
            </div>
            <div class="absolute right-0 bottom-0 top-0 w-1/2 opacity-10 bg-[url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=800')] bg-cover bg-center"></div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- FILTRES LATERAUX (Pays & Postes) -->
            <aside class="w-full lg:w-64 flex-shrink-0">
                <div class="bg-white p-6 rounded-xl border border-slate-100 sticky top-24 shadow-sm">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Filtrer par Pays</h2>
                    <div class="space-y-1 mb-6 max-h-60 overflow-y-auto pr-2" id="paysFilters">
                        <!-- Injecté par JS -->
                    </div>

                    <hr class="my-4 border-slate-100">

                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Poste</h2>
                    <div class="space-y-1" id="posteFilters">
                        <!-- Injecté par JS -->
                    </div>
                </div>
            </aside>

            <!-- GRILLE DES JOUEURS -->
            <section class="flex-1">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-sm text-slate-500"><span id="joueurCount" class="font-bold text-slate-950">0</span> joueurs sélectionnés</p>
                    <select id="sortSelect" onchange="filtrerJoueurs()" class="bg-transparent text-sm font-semibold text-slate-700 focus:outline-none cursor-pointer">
                        <option value="default">Trier par</option>
                        <option value="valeurDesc">Valeur : Élevée à Faible</option>
                        <option value="valeurAsc">Valeur : Faible à Élevée</option>
                        <option value="nom">Nom (A-Z)</option>
                    </select>
                </div>

                <!-- Grille -->
                <div id="joueursGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-3 gap-6">
                    <!-- Les cartes des joueurs vont s'injecter ici via JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <!-- LOGIQUE JAVASCRIPT -->
    <script>
        let tousLesJoueurs = [];
        let paysSelectionne = 'Tous';
        let posteSelectionne = 'Tous';

        // Structure recommandée pour ton fichier Excel/CSV :
        // Nom,Pays,Poste,Club,Age,Valeur,Image,SelectionNumero
        const csvSimule = `Nom,Pays,Poste,Club,Age,Valeur,Image,SelectionNumero
Kylian Mbappé,France,Attaquant,Real Madrid,27,180000000,https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=400,10
Erling Haaland,Norvège,Attaquant,Manchester City,25,180000000,https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400,9
Jude Bellingham,Angleterre,Milieu,Real Madrid,22,150000000,https://images.unsplash.com/photo-1544816155-12df9643f363?w=400,5
William Saliba,France,Défenseur,Arsenal,25,80000000,https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=400,4
Mike Maignan,France,Gardien,AC Milan,30,40000000,https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=400,1
Pedri,Espagne,Milieu,FC Barcelone,23,90000000,https://images.unsplash.com/photo-1544816155-12df9643f363?w=400,8`;

        document.addEventListener("DOMContentLoaded", () => {
            analyserCSV(csvSimule);
            // Pour charger ton vrai fichier sur GitHub plus tard :
            // Papa.parse("data/joueurs.csv", { download: true, header: true, complete: (res) => initialiserPlateforme(res.data) });
        });

        function analyserCSV(donneesCsv) {
            Papa.parse(donneesCsv, {
                header: true,
                dynamicTyping: true, // Convertit automatiquement les nombres (comme la Valeur ou l'Age)
                skipEmptyLines: true,
                complete: function(results) {
                    initialiserPlateforme(results.data);
                }
            });
        }

        function initialiserPlateforme(joueurs) {
            tousLesJoueurs = joueurs;
            genererFiltresPays();
            genererFiltresPostes();
            filtrerJoueurs();
        }

        function genererFiltresPays() {
            const pays = ['Tous', ...new Set(tousLesJoueurs.map(j => j.Pays))];
            const conteneur = document.getElementById('paysFilters');
            conteneur.innerHTML = '';
            pays.forEach(p => {
                const b = document.createElement('button');
                b.textContent = p;
                b.className = `w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all ${paysSelectionne === p ? 'bg-emerald-600 text-white font-semibold' : 'text-slate-600 hover:bg-slate-100'}`;
                b.onclick = () => { paysSelectionne = p; genererFiltresPays(); filtrerJoueurs(); };
                conteneur.appendChild(b);
            });
        }

        function genererFiltresPostes() {
            const postes = ['Tous', ...new Set(tousLesJoueurs.map(j => j.Poste))];
            const conteneur = document.getElementById('posteFilters');
            conteneur.innerHTML = '';
            postes.forEach(post => {
                const b = document.createElement('button');
                b.textContent = post;
                b.className = `w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all ${posteSelectionne === post ? 'bg-emerald-600 text-white font-semibold' : 'text-slate-600 hover:bg-slate-100'}`;
                b.onclick = () => { posteSelectionne = post; genererFiltresPostes(); filtrerJoueurs(); };
                conteneur.appendChild(b);
            });
        }

        function formatValeur(num) {
            if (!num) return "-";
            if (num >= 1000000) return (num / 1000000) + ' M€';
            return num.toLocaleString() + ' €';
        }

        function afficherJoueurs(liste) {
            const grid = document.getElementById('joueursGrid');
            document.getElementById('joueurCount').textContent = liste.length;
            grid.innerHTML = '';

            if(liste.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">Aucun joueur trouvé.</div>`;
                return;
            }

            liste.forEach(joueur => {
                const carte = document.createElement('div');
                carte.className = "bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 relative group";
                carte.innerHTML = `
                    <!-- Numéro de sélection en haut à droite -->
                    <div class="absolute top-3 right-3 bg-slate-100 text-slate-700 font-bold text-xs w-7 h-7 rounded-full flex items-center justify-center z-10">
                        N°${joueur.SelectionNumero || '?'}
                    </div>
                    
                    <div class="p-5">
                        <div class="flex items-center gap-4">
                            <!-- Image de profil ou initiales si pas d'image -->
                            <div class="w-16 h-16 rounded-full bg-slate-100 border border-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
                                <span class="text-slate-400 font-bold text-xl">${joueur.Nom.charAt(0)}</span>
                            </div>
                            <div>
                                <span class="text-[10px] font-extrabold uppercase tracking-widest text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">${joueur.Poste}</span>
                                <h3 class="font-bold text-lg text-slate-900 mt-1 leading-tight group-hover:text-emerald-600 transition-colors">${joueur.Nom}</h3>
                                <p class="text-xs text-slate-500 font-medium">${joueur.Pays} • ${joueur.Age} ans</p>
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-t border-slate-50 flex justify-between items-center text-sm">
                            <div>
                                <p class="text-[11px] uppercase tracking-wider text-slate-400 font-semibold">Club</p>
                                <p class="font-semibold text-slate-700">${joueur.Club}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[11px] uppercase tracking-wider text-slate-400 font-semibold">Valeur Marchande</p>
                                <p class="font-extrabold text-slate-950 text-base">${formatValeur(joueur.Valeur)}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(carte);
            });
        }

        function filtrerJoueurs() {
            const recherche = document.getElementById('searchInput').value.toLowerCase();
            const tri = document.getElementById('sortSelect').value;
            
            let resultats = tousLesJoueurs.filter(j => {
                const matchPays = (paysSelectionne === 'Tous' || j.Pays === paysSelectionne);
                const matchPoste = (posteSelectionne === 'Tous' || j.Poste === posteSelectionne);
                const matchTexte = (j.Nom.toLowerCase().includes(recherche) || j.Club.toLowerCase().includes(recherche));
                return matchPays && matchPoste && matchTexte;
            });

            // Tri des données
            if (tri === "valeurDesc") resultats.sort((a, b) => b.Valeur - a.Valeur);
            if (tri === "valeurAsc") resultats.sort((a, b) => a.Valeur - b.Valeur);
            if (tri === "nom") resultats.sort((a, b) => a.Nom.localeCompare(b.Nom));

            afficherJoueurs(resultats);
        }
    </script>
</body>
</html>
